# focus settings
focus_on_window_activation focus
focus_follows_mouse no

# window rules
for_window [app_id="(?i)blueman-manager|nm-connection-editor|pavucontrol"] \
  floating enable, resize set 60ppt 60ppt, move position center

for_window [app_id="(?i)$term"] \
  floating enable, resize set 40ppt 42ppt, move position center

for_window [app_id="(?i)calculator"] \
  floating enable, resize set 20ppt 40ppt, move position center

for_window [app_id="(?i)texteditor"] \
  floating enable, resize set 30ppt 50ppt, move position center

# misc rules
for_window [window_type="dialog"]  floating enable, move position center
for_window [window_type="utility"] floating enable, move position center
for_window [window_type="popup_menu"] floating enable

# assing windows
for_window [app_id="vesktop"] move to workspace 2
for_window [app_id="spotify"] move to workspace 2
