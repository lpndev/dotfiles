# environment and authentication
exec dbus-update-activation-environment --systemd --all
exec systemctl --user import-environment
exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# disable middle mouse button paste
primary_selection disabled
exec wl-paste --primary --watch wl-copy --primary ""

# background services
exec wl-paste --type image --watch cliphist store
exec wl-paste --type text --watch cliphist store
exec_always sh -c 'killall -q waybar; sleep 0.8 && waybar'
exec_always sh -c 'killall -q nwg-dock; sleep 0.8 && nwg-dock -d -nolauncher -nows -hd 0 -l top'
exec autotiling
exec nm-applet
exec swaync
exec swayosd-server

# autostart apps
exec vesktop
exec spotify-launcher
exec com.github.wwmm.easyeffects --gapplication-service
