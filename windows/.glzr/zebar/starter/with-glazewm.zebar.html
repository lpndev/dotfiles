<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:;" />
    <script
      src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
      integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo="
      crossorigin="anonymous"
    ></script>

    <script>
      document.addEventListener('keydown', (event) => {
        if (event.ctrlKey && event.key === 'u') {
          event.preventDefault()
          return false
        }
        if (event.key === 'F12') {
          event.preventDefault()
          return false
        }
        if (event.ctrlKey && event.shiftKey && event.key === 'I') {
          event.preventDefault()
          return false
        }
        if (event.ctrlKey && event.shiftKey && event.key === 'J') {
          event.preventDefault()
          return false
        }
        if (event.ctrlKey && event.shiftKey && event.key === 'C') {
          event.preventDefault()
          return false
        }
      })
      document.addEventListener('contextmenu', (event) =>
        event.preventDefault()
      )
    </script>

    <style>
      @import 'https://www.nerdfonts.com/assets/css/webfont.css';

      :root {
        --accent-color: rgb(129, 140, 248);
        --background-color: rgb(24, 24, 27);
        --background-clear: rgba(24, 24, 27, 0.5);
        --foreground-color: rgb(244, 244, 245);
        --foreground-clear: rgba(244, 244, 245, 0.1);
        --foreground-clear: #f4f4f51a;
        --border-radius: 1rem;
        --padding: 4px 8px;
        --button-padding: 2px 6px;
        --gap: 8px;
        --big-gap: 12px;
      }

      *,
      ::before,
      ::after {
        box-sizing: border-box;
      }

      * {
        font: inherit;
        margin: 0;
        padding: 0;
      }

      body {
        font: 0.8rem/1.2 JetBrainsMono Nerd Font, system-ui, monospace;
        width: 100%;
        display: flex;
        justify-content: center;
        align-content: center;
        color: var(--foreground-color);
        overflow: hidden;
        position: relative;
        pointer-events: none;
        user-select: none;
      }

      button {
        border-radius: var(--border-radius);
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--accent-color);
        border: 1px solid var(--foreground-clear);
        outline: none;
        color: var(--background-color);
        cursor: pointer;
        padding: var(--button-padding);
        pointer-events: all;
      }

      #root {
        width: 100%;
        height: 100%;
        padding: var(--padding);
      }

      .app {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }

      .app > div {
        padding: var(--padding);
        background-color: var(--background-clear);
        border: 1px solid var(--foreground-clear);
        display: flex;
        border-radius: var(--border-radius);
        align-items: center;
        gap: var(--big-gap);
      }

      .app > div > div {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: var(--gap);
      }

      .app > div:nth-child(2) {
        font-size: 14px;
        width: fit-content;
        position: absolute;
        margin: auto;
        left: 0;
        right: 0;
      }

      .workspaces {
        display: flex;
        align-items: center;
      }

      .workspace {
        height: 16px;
        width: 16px;
        filter: brightness(0.8);

        &.focused {
          width: 28px;
          filter: brightness(1.5);
          color: var(--background-color);
        }

        &.focused:hover {
          filter: brightness(1.5);
        }

        &:hover {
          filter: brightness(1);
        }
      }

      .workspace-item {
        display: none;
      }

      .high-usage {
        color: rgba(220, 38, 38, 0.8);
      }

      .battery {
        position: relative;
      }

      .charging-icon {
        position: absolute;
        font-size: 7px;
        left: -8px;
        top: 3px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from 'https://esm.sh/react@18?dev'
      import { createRoot } from 'https://esm.sh/react-dom@18/client?dev'
      import * as zebar from 'https://esm.sh/zebar@2'

      const providers = zebar.createProviderGroup({
        network: { type: 'network' },
        glazewm: { type: 'glazewm' },
        cpu: { type: 'cpu' },
        date: { type: 'date', formatting: 'EEE d MMM t' },
        battery: { type: 'battery' },
        memory: { type: 'memory' },
        weather: { type: 'weather' },
      })

      createRoot(document.getElementById('root')).render(<App />)

      function App() {
        const [output, setOutput] = useState(providers.outputMap)

        useEffect(() => {
          providers.onOutput(() => setOutput(providers.outputMap))
        }, [])

        function getNetworkIcon(networkOutput) {
          switch (networkOutput.defaultInterface?.type) {
            case 'ethernet':
              return <i className='nf nf-md-ethernet_cable'></i>
            case 'wifi':
              if (networkOutput.defaultGateway?.signalStrength >= 80) {
                return <i className='nf nf-md-wifi_strength_4'></i>
              } else if (networkOutput.defaultGateway?.signalStrength >= 65) {
                return <i className='nf nf-md-wifi_strength_3'></i>
              } else if (networkOutput.defaultGateway?.signalStrength >= 40) {
                return <i className='nf nf-md-wifi_strength_2'></i>
              } else if (networkOutput.defaultGateway?.signalStrength >= 25) {
                return <i className='nf nf-md-wifi_strength_1'></i>
              } else {
                return <i className='nf nf-md-wifi_strength_outline'></i>
              }
            default:
              return <i className='nf nf-md-wifi_strength_off_outline'></i>
          }
        }

        function getBatteryIcon(batteryOutput) {
          if (batteryOutput.chargePercent > 90)
            return <i className='nf nf-fa-battery_4'></i>
          if (batteryOutput.chargePercent > 70)
            return <i className='nf nf-fa-battery_3'></i>
          if (batteryOutput.chargePercent > 40)
            return <i className='nf nf-fa-battery_2'></i>
          if (batteryOutput.chargePercent > 20)
            return <i className='nf nf-fa-battery_1'></i>
          return <i className='nf nf-fa-battery_0'></i>
        }

        function getWeatherIcon(weatherOutput) {
          switch (weatherOutput.status) {
            case 'clear_day':
              return <i className='nf nf-weather-day_sunny'></i>
            case 'clear_night':
              return <i className='nf nf-weather-night_clear'></i>
            case 'cloudy_day':
              return <i className='nf nf-weather-day_cloudy'></i>
            case 'cloudy_night':
              return <i className='nf nf-weather-night_alt_cloudy'></i>
            case 'light_rain_day':
              return <i className='nf nf-weather-day_sprinkle'></i>
            case 'light_rain_night':
              return <i className='nf nf-weather-night_alt_sprinkle'></i>
            case 'heavy_rain_day':
              return <i className='nf nf-weather-day_rain'></i>
            case 'heavy_rain_night':
              return <i className='nf nf-weather-night_alt_rain'></i>
            case 'snow_day':
              return <i className='nf nf-weather-day_snow'></i>
            case 'snow_night':
              return <i className='nf nf-weather-night_alt_snow'></i>
            case 'thunder_day':
              return <i className='nf nf-weather-day_lightning'></i>
            case 'thunder_night':
              return <i className='nf nf-weather-night_alt_lightning'></i>
          }
        }

        return (
          <div className='app'>
            <div>
              {output.glazewm && (
                <div className='workspaces'>
                  {output.glazewm.currentWorkspaces.map((workspace) => (
                    <button
                      className={`workspace ${
                        workspace.hasFocus && 'focused'
                      } ${workspace.isDisplayed && 'displayed'}`}
                      onClick={() =>
                        output.glazewm.runCommand(
                          `focus --workspace ${workspace.name}`
                        )
                      }
                      key={workspace.name}
                    >
                      <span className='workspace-item'>
                        {workspace.displayName ?? workspace.name}
                      </span>
                    </button>
                  ))}
                </div>
              )}
            </div>

            <div>{output.date?.formatted}</div>

            <div>
              {output.glazewm && (
                <>
                  {output.glazewm.bindingModes.map((bindingMode) => (
                    <button className='binding-mode' key={bindingMode.name}>
                      {bindingMode.displayName ?? bindingMode.name}
                    </button>
                  ))}

                  <button
                    className={`tiling-direction nf ${
                      output.glazewm.tilingDirection === 'horizontal'
                        ? 'nf-md-swap_horizontal'
                        : 'nf-md-swap_vertical'
                    }`}
                    onClick={() =>
                      output.glazewm.runCommand('toggle-tiling-direction')
                    }
                  ></button>
                </>
              )}

              {output.network && (
                <div className='network'>
                  {getNetworkIcon(output.network)}
                  {output.network.defaultGateway?.ssid}
                </div>
              )}

              {output.memory && (
                <div className='memory'>
                  <i className='nf nf-fae-chip'></i>

                  <span
                    className={output.memory.usage > 85 ? 'high-usage' : ''}
                  >
                    {Math.round(output.memory.usage)}%
                  </span>
                </div>
              )}

              {output.cpu && (
                <div className='cpu'>
                  <i className='nf nf-oct-cpu'></i>

                  <span className={output.cpu.usage > 85 ? 'high-usage' : ''}>
                    {Math.round(output.cpu.usage)}%
                  </span>
                </div>
              )}

              {output.battery && (
                <div className='battery'>
                  {output.battery.isCharging && (
                    <i className='nf nf-md-power_plug charging-icon'></i>
                  )}
                  {getBatteryIcon(output.battery)}
                  {Math.round(output.battery.chargePercent)}%
                </div>
              )}

              {output.weather && (
                <div className='weather'>
                  {getWeatherIcon(output.weather)}
                  {Math.round(output.weather.celsiusTemp)}°C
                </div>
              )}
            </div>
          </div>
        )
      }
    </script>
  </body>
</html>
